<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlashInvoice — Tests</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f172a; color: #e2e8f0; padding: 32px; }
    h1 { font-size: 1.5rem; margin-bottom: 8px; }
    .summary { font-size: 1rem; margin-bottom: 24px; padding: 12px 16px; border-radius: 8px; font-weight: 600; }
    .summary.pass { background: #166534; color: #bbf7d0; }
    .summary.fail { background: #991b1b; color: #fecaca; }
    .suite { margin-bottom: 20px; }
    .suite-name { font-size: 1rem; font-weight: 700; color: #94a3b8; margin-bottom: 8px; padding-left: 4px; }
    .test { padding: 6px 12px; font-size: 0.88rem; border-left: 3px solid transparent; margin-bottom: 2px; border-radius: 0 4px 4px 0; }
    .test.pass { border-left-color: #22c55e; color: #bbf7d0; }
    .test.fail { border-left-color: #ef4444; color: #fca5a5; background: rgba(239,68,68,0.1); }
    .test .label::before { margin-right: 8px; }
    .test.pass .label::before { content: '\2713'; color: #22c55e; }
    .test.fail .label::before { content: '\2717'; color: #ef4444; }
    .test .error { display: block; font-size: 0.8rem; color: #f87171; margin-top: 2px; padding-left: 24px; }
  </style>
</head>
<body>
  <h1>FlashInvoice Test Suite</h1>
  <div id="summary" class="summary"></div>
  <div id="results"></div>

  <!-- Load app.js for FlashInvoice object (DOM init won't run since no #lineItemsBody) -->
  <script src="app.js"></script>
  <script src="tests.js"></script>
</body>
</html>
